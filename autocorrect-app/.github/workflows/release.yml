name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-tauri:
    name: Build App ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS ARM64
            platform: macos-latest
            args: --target aarch64-apple-darwin
            artifact_id: macos-arm64
          - name: macOS AMD64
            platform: macos-13
            args: --target x86_64-apple-darwin
            artifact_id: macos-amd64
          - name: Linux (Ubuntu 22.04)
            platform: ubuntu-22.04
            args: ""
            artifact_id: linux
          - name: Windows
            platform: windows-latest
            args: ""
            artifact_id: windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Rust targets
        if: startsWith(matrix.platform, 'macos-')
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app with Tauri action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: AutoCorrect ${{ github.ref_name }}
          releaseBody: See packaged installers below.
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}

      - name: Upload desktop app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autocorrect_app_${{ matrix.artifact_id }}
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/*/release/bundle/**

  release:
    name: Publish Release Assets
    if: ${{ always() && needs.build-tauri.result != 'cancelled' }}
    needs:
      - build-tauri
    runs-on: ubuntu-latest

    steps:
      - name: Download Tauri app artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: autocorrect_app_*
          merge-multiple: false
          path: dist/app

      - name: Show downloaded files
        run: ls -lahR dist || true

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/app/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
          fail_on_unmatched_files: false
